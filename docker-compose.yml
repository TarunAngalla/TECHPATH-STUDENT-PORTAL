services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: techpath
      POSTGRES_PASSWORD: techpath
      POSTGRES_DB: techpath
    volumes:
      - techpath_pgdata:/var/lib/postgresql/data

volumes:
  techpath_pgdata:
